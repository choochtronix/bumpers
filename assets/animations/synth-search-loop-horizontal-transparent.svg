<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" fill="none" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Synth search loop horizontal</title>
  <desc id="desc">A transparent-background horizontal SVG animation of a magnifying glass scanning a traveling synthesizer-style waveform.</desc>
  <style>
    svg {
      display: block;
      overflow: visible;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
      color: #000;
    }

    .line {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .thin {
      stroke-width: 1.5;
    }

    .wave-base {
      opacity: 0.22;
    }

    .wave-travel {
      stroke-dasharray: 84 420;
      animation: travel 3.6s linear infinite;
    }

    .glass {
      animation: scan 3.6s linear infinite;
      transform-box: fill-box;
      transform-origin: center;
      will-change: transform, opacity;
    }

    .ring,
    .crosshair {
      animation: pulse 3.6s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
      will-change: transform, opacity;
    }

    @keyframes travel {
      0%   { stroke-dashoffset: 330; opacity: 0.35; }
      15%  { opacity: 0.8; }
      50%  { opacity: 1; }
      85%  { opacity: 0.8; }
      100% { stroke-dashoffset: -174; opacity: 0.35; }
    }

    @keyframes scan {
      0%   { transform: translateX(-112px) translateY(0); opacity: 0; }
      6%   { opacity: 1; }
      24%  { transform: translateX(-54px) translateY(-2px); }
      52%  { transform: translateX(0) translateY(2px); }
      78%  { transform: translateX(58px) translateY(-1px); opacity: 1; }
      96%  { transform: translateX(112px) translateY(0); opacity: 1; }
      100% { transform: translateX(120px) translateY(0); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      35%      { transform: scale(1.05); opacity: 1; }
      55%      { transform: scale(0.98); opacity: 0.85; }
      78%      { transform: scale(1.04); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .wave-travel,
      .glass,
      .ring,
      .crosshair {
        animation: none;
      }
    }
  </style>

  <path d="M20 70
           C40 70, 40 42, 60 42
           S80 98, 100 98
           S120 28, 140 28
           S160 70, 180 70
           S200 52, 220 52
           S240 92, 260 92
           S280 22, 300 22
           S320 70, 340 70"
        class="line thin wave-base"/>

  <path d="M20 70
           C40 70, 40 42, 60 42
           S80 98, 100 98
           S120 28, 140 28
           S160 70, 180 70
           S200 52, 220 52
           S240 92, 260 92
           S280 22, 300 22
           S320 70, 340 70"
        class="line thin wave-travel"/>

  <g class="glass" transform="translate(112 0)">
    <circle cx="180" cy="58" r="18" class="line ring"/>
    <line x1="193" y1="71" x2="210" y2="88" class="line"/>
    <path d="M172 58h16M180 50v16" class="line thin crosshair" opacity="0.9"/>
  </g>
</svg>
