<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" width="1600" height="700" role="img" aria-labelledby="title desc">
  <title id="title">Ground plane graph loading animation</title>
  <desc id="desc">Transparent ultra-wide SVG loading animation with a clean one point perspective ground grid and a searching magnifying glass.</desc>
  <style>
    :root {
      color: #111827;
    }

    svg {
      background: transparent;
    }

    .line,
    .lens {
      fill: none;
      stroke: currentColor;
      stroke-width: 1pt;
      stroke-linecap: square;
      stroke-linejoin: miter;
      vector-effect: non-scaling-stroke;
    }

    .ray {
      opacity: 0.42;
    }

    .horizon {
      opacity: 0.24;
    }

    .travel-band {
      opacity: 0.52;
    }

    .magnifier {
      animation: lensBob 1.1s ease-in-out infinite alternate;
    }

    @keyframes lensBob {
      from {
        transform: translateY(-5px);
      }
      to {
        transform: translateY(5px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .travel-band,
      .magnifier {
        animation: none;
        opacity: 0.54;
      }

      animate,
      animateMotion,
      animateTransform {
        display: none;
      }
    }
  </style>

  <defs>
    <path id="search-path" d="M 0 0 C 142 -148 322 -154 412 -84 S 634 34 784 -128 C 892 -244 760 -315 617 -269 C 462 -219 388 -284 272 -306 C 170 -325 45 -268 48 -160 C 51 -53 190 -8 298 -41 C 210 26 70 54 0 0" />

    <clipPath id="ground-clip">
      <rect x="0" y="292" width="1600" height="408" />
    </clipPath>

    <g id="floor-lines" class="line">
      <line x1="-860" y1="7" x2="860" y2="7" />
      <line x1="-860" y1="10.07" x2="860" y2="10.07" />
      <line x1="-860" y1="14.5" x2="860" y2="14.5" />
      <line x1="-860" y1="20.86" x2="860" y2="20.86" />
      <line x1="-860" y1="30.02" x2="860" y2="30.02" />
      <line x1="-860" y1="43.2" x2="860" y2="43.2" />
      <line x1="-860" y1="62.16" x2="860" y2="62.16" />
      <line x1="-860" y1="89.45" x2="860" y2="89.45" />
      <line x1="-860" y1="128.72" x2="860" y2="128.72" />
      <line x1="-860" y1="185.23" x2="860" y2="185.23" />
      <line x1="-860" y1="266.55" x2="860" y2="266.55" />
      <line x1="-860" y1="383.57" x2="860" y2="383.57" />
      <line x1="-860" y1="551.97" x2="860" y2="551.97" />
      <line x1="-860" y1="794.3" x2="860" y2="794.3" />
      <line x1="-860" y1="1143.02" x2="860" y2="1143.02" />
      <line x1="-860" y1="1644.83" x2="860" y2="1644.83" />
    </g>
  </defs>

  <g id="perspective-grid" clip-path="url(#ground-clip)">
    <g class="line ray">
      <line x1="800" y1="292" x2="-760" y2="700" />
      <line x1="800" y1="292" x2="-420" y2="700" />
      <line x1="800" y1="292" x2="-120" y2="700" />
      <line x1="800" y1="292" x2="168" y2="700" />
      <line x1="800" y1="292" x2="470" y2="700" />
      <line x1="800" y1="292" x2="800" y2="700" />
      <line x1="800" y1="292" x2="1130" y2="700" />
      <line x1="800" y1="292" x2="1432" y2="700" />
      <line x1="800" y1="292" x2="1720" y2="700" />
      <line x1="800" y1="292" x2="2020" y2="700" />
      <line x1="800" y1="292" x2="2360" y2="700" />
    </g>

    <line class="line horizon" x1="0" y1="292" x2="1600" y2="292" />

    <g transform="translate(800 292)">
      <g class="travel-band">
        <use href="#floor-lines" />
        <animateTransform attributeName="transform" type="scale" values="1 .82; 1 1.18" dur="1.45s" repeatCount="indefinite" />
      </g>
    </g>
  </g>

  <g class="magnifier">
    <g transform="translate(378 498)">
      <animateMotion dur="6.2s" repeatCount="indefinite" rotate="0">
        <mpath href="#search-path" />
      </animateMotion>
      <circle class="lens" cx="0" cy="0" r="58" />
      <line class="lens" x1="42" y1="42" x2="112" y2="112" />
    </g>
  </g>
</svg>
