<svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <clipPath id="knob-clip-v02">
      <rect width="38" height="38" fill="white"/>
    </clipPath>

    <style>
      /*
       * Knob-turn animation — v02 artwork, deeper sweep angles
       *
       * Phase 1  0–10 %   : brief rest at 0°
       * Phase 2 10–40 %   : decisive turn left to –68°
       * Phase 3 40–62 %   : spring release, overshoots right to +26°
       * Phase 4 62–74 %   : damped bounce back left to –9°
       * Phase 5 74–83 %   : small bounce right to +4°
       * Phase 6 83–90 %   : settle to 0°
       * Phase 7 90–100%   : hold before next loop
       *
       * Easing curves are identical to v01 — only the degree values change.
       */
      .knob-rotor-v02 {
        transform-box:    view-box;
        transform-origin: 50% 50%;
      }

      @keyframes knob-turn-v02 {

        /* ── rest ── */
        0%, 10% {
          transform: rotate(0deg);
          animation-timing-function: cubic-bezier(0.55, 0, 0.95, 0.35);
        }

        /* ── max left turn ── */
        40% {
          transform: rotate(-68deg);
          animation-timing-function: cubic-bezier(0.34, 1.6, 0.64, 1);
        }

        /* ── spring overshoot right ── */
        62% {
          transform: rotate(26deg);
          animation-timing-function: cubic-bezier(0.36, 0, 0.66, -0.56);
        }

        /* ── bounce back left ── */
        74% {
          transform: rotate(-9deg);
          animation-timing-function: cubic-bezier(0.34, 1.3, 0.64, 1);
        }

        /* ── small overshoot right ── */
        83% {
          transform: rotate(4deg);
          animation-timing-function: ease-in-out;
        }

        /* ── settled ── */
        90%, 100% {
          transform: rotate(0deg);
        }

      }
    </style>

  </defs>

  <!-- Static clip keeps content inside 38×38 at all rotation angles -->
  <g clip-path="url(#knob-clip-v02)">

    <!-- Rotates as one unit -->
    <g class="knob-rotor-v02">
      <circle cx="19" cy="19" r="18" stroke="black" stroke-width="2"/>
      <path d="M19 2.5V15" stroke="black" stroke-width="2" stroke-linecap="round"/>
    </g>

  </g>

</svg>
