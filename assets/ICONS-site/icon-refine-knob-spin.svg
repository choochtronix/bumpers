<svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <clipPath id="knob-clip">
      <rect width="38" height="38" fill="white"/>
    </clipPath>

    <style>
      /*
       * Knob-turn animation
       * Phase 1  0–10 %   : brief rest at centre
       * Phase 2 10–40 %   : decisive turn left to –42°
       * Phase 3 40–62 %   : spring release, overshoots right to +11°
       * Phase 4 62–74 %   : damped bounce back left to –4°
       * Phase 5 74–83 %   : small bounce right to +1.5°
       * Phase 6 83–90 %   : settle to 0°
       * Phase 7 90–100%   : hold before next loop
       */
      .knob-rotor {
        transform-box:    view-box;
        transform-origin: 50% 50%;
      }

      @keyframes knob-turn {

        /* ── rest ── */
        0%, 10% {
          transform: rotate(0deg);
          animation-timing-function: cubic-bezier(0.55, 0, 0.95, 0.35);
        }

        /* ── max left turn ── */
        40% {
          transform: rotate(-42deg);
          animation-timing-function: cubic-bezier(0.34, 1.6, 0.64, 1);
        }

        /* ── spring overshoot right ── */
        62% {
          transform: rotate(11deg);
          animation-timing-function: cubic-bezier(0.36, 0, 0.66, -0.56);
        }

        /* ── bounce back left ── */
        74% {
          transform: rotate(-4deg);
          animation-timing-function: cubic-bezier(0.34, 1.3, 0.64, 1);
        }

        /* ── small overshoot right ── */
        83% {
          transform: rotate(1.5deg);
          animation-timing-function: ease-in-out;
        }

        /* ── settled ── */
        90%, 100% {
          transform: rotate(0deg);
        }
      }
    </style>

  </defs>

  <!-- Static clip wrapper keeps content inside the 38×38 bounds at all rotations -->
  <g clip-path="url(#knob-clip)">

    <!-- Everything inside here rotates as one knob -->
    <g class="knob-rotor">

      <!-- Knob face — white fill -->
      <path d="M18.8611 1.07594C28.7979 1.07595 36.8533 9.13133 36.8533 19.0681C36.8533 29.0049 28.7979 37.0603 18.8611 37.0603C8.92431 37.0603 0.868933 29.0049 0.868927 19.0681C0.868927 9.13133 8.92431 1.07594 18.8611 1.07594Z" fill="white" stroke="#FF00FF"/>

      <!-- Inner arc -->
      <path d="M28.0134 7.95663C31.204 10.5935 33.2373 14.5813 33.2373 19.0438C33.2373 26.9836 26.8008 33.4201 18.8611 33.4201C10.9213 33.4201 4.48477 26.9836 4.48477 19.0438C4.48477 14.5435 6.5525 10.5261 9.79031 7.88986" stroke="#FF00FF" stroke-miterlimit="10"/>

