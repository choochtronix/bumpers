      <!-- Left grip tab -->
      <path d="M19.7371 12.5851L16.6895 12.5817C15.3913 12.5837 15.2915 11.7555 15.2868 11.7238L15.2847 8.91158C15.2881 8.64047 14.8976 8.36599 14.6602 8.25134L9.87668 8.24797C6.37787 8.24932 2.67808 12.2829 2.64302 12.318C2.48318 12.5028 2.20061 12.5156 2.01447 12.3497C1.83643 12.1872 1.82024 11.9086 1.98615 11.7265C2.1453 11.5472 5.98806 7.3618 9.876 7.3618L14.7573 7.36045C14.8201 7.36585 14.8801 7.37866 14.932 7.40361C15.0595 7.4515 16.1702 7.95393 16.1736 8.91293L16.1716 11.6753C16.1702 11.5991 16.3166 11.6955 16.6969 11.6969L19.7351 11.6982C19.9779 11.6962 20.1755 11.8938 20.1755 12.1386C20.1823 12.3814 19.986 12.5776 19.7371 12.5857V12.5851Z" fill="#261F1C" stroke="#FF00FF" stroke-miterlimit="10"/>

      <!-- Right grip tab -->
      <path d="M21.4825 12.5851L19.7344 12.583C19.4869 12.581 19.2886 12.3821 19.2886 12.1373C19.2907 11.8945 19.4869 11.6982 19.7344 11.6982L21.4858 11.6969C21.8628 11.6948 22.0065 11.6004 22.026 11.5654L22.0099 8.91428C22.0099 7.95663 23.1139 7.45352 23.2413 7.40159C23.3007 7.37664 23.3641 7.36112 23.4194 7.3618L28.3041 7.36382C32.1967 7.3618 35.9491 11.6699 36.1049 11.8527C36.2647 12.0354 36.2465 12.3146 36.0631 12.4731C35.8776 12.6329 35.6011 12.6107 35.4352 12.4246C35.3988 12.3881 31.7887 8.24662 28.3041 8.25606L23.5192 8.25134C23.2744 8.37408 22.898 8.64519 22.8927 8.91158L22.8974 11.676C22.8906 11.7555 22.7928 12.5797 21.4825 12.5851Z" fill="#261F1C" stroke="#FF00FF" stroke-miterlimit="10"/>

      <!-- Left indicator line -->
      <path d="M15.8067 7.75498C15.7851 7.7543 15.7514 7.7543 15.7237 7.74891C15.5032 7.69698 15.3677 7.48454 15.4128 7.26266L16.7097 0.913143C16.7556 0.694636 16.9741 0.555035 17.1919 0.602243C17.4104 0.650126 17.55 0.86661 17.5028 1.08377L16.2066 7.43868C16.1601 7.62684 15.9962 7.757 15.8067 7.75498Z" fill="#261F1C" stroke="#FF00FF" stroke-miterlimit="10"/>

      <!-- Right indicator line -->
      <path d="M22.2992 8.2419C22.1137 8.23785 21.9445 8.11174 21.8986 7.92628L20.5282 0.953608C20.4797 0.740497 20.6166 0.517268 20.8324 0.474781C21.0522 0.425549 21.2714 0.557732 21.3206 0.773541L22.6924 7.74554C22.7423 7.96404 22.604 8.18188 22.3842 8.23246C22.3559 8.23785 22.3269 8.2419 22.2999 8.2419H22.2992Z" fill="#261F1C" stroke="#FF00FF" stroke-miterlimit="10"/>

    </g><!-- /knob-rotor -->

  </g><!-- /clip wrapper -->

</svg>
