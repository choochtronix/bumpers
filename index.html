<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bumpers</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Saved searches">
        <div class="brand-row">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">B</div>
            <div>
              <h1>Bumpers</h1>
              <p>Japan gear radar</p>
            </div>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to dark mode" title="Switch to dark mode">
            <span class="theme-icon" aria-hidden="true">◐</span>
          </button>
        </div>

        <form class="search-form" id="searchForm">
          <label>
            <span>Name</span>
            <input id="profileName" type="text" value="Waldorf" autocomplete="off" />
          </label>

          <label>
            <span>Terms</span>
            <textarea id="terms" rows="4">Waldorf
ワルドルフ
WALDORF</textarea>
          </label>

          <label>
            <span>Exclude</span>
            <textarea id="excludes" rows="5">manual
magnet
power cord
doll
Fashionist
shirt
CD
Moments to Remember
record
shoes</textarea>
          </label>

          <details class="advanced-options">
            <summary>Clean gear noise</summary>
            <label>
              <span>Hide when quality is clean</span>
              <textarea id="noiseTerms" rows="4">adapter
book
cable
case
cover
decksaver
patch book
power supply
stand
アダプター
カタログ
カバー
ケース
ケーブル
スタンド
デッキセーバー
シャツ
ジャケット
スニーカー
ブーツ
靴
取扱説明書</textarea>
            </label>
          </details>

          <div class="form-grid">
            <label>
              <span>Max price</span>
              <input id="maxPrice" type="number" value="2000000" min="0" step="1000" />
            </label>
            <label>
              <span>Alert</span>
              <select id="alertMode">
                <option value="immediate">Immediate</option>
                <option value="hourly">Hourly</option>
                <option value="daily">Daily</option>
              </select>
            </label>
          </div>

          <fieldset>
            <legend>Sources</legend>
            <div class="source-list" id="sourceList"></div>
          </fieldset>

          <button class="primary-action" type="submit">
            <span aria-hidden="true">⌕</span>
            Run search
          </button>
        </form>

        <section class="saved-panel" aria-labelledby="savedTitle">
          <div class="panel-heading">
            <h2 id="savedTitle">Saved Searches</h2>
            <button id="saveProfile" type="button" title="Save current search" aria-label="Save current search">＋</button>
          </div>
          <div class="saved-searches" id="savedSearches"></div>
        </section>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Active Search</p>
            <h2 id="activeTitle">Waldorf</h2>
          </div>
          <div class="status-strip" aria-label="Search totals">
            <div>
              <strong id="totalCount">0</strong>
              <span>matches</span>
            </div>
            <div>
              <strong id="newCount">0</strong>
              <span>new</span>
            </div>
            <div>
              <strong id="sourceCount">0</strong>
              <span>sources</span>
            </div>
          </div>
        </header>

        <section class="controls" aria-label="Result controls">
          <div class="segmented" id="urgencyFilter" role="tablist" aria-label="Listing filter">
            <button class="active" type="button" data-filter="all">All</button>
            <button type="button" data-filter="new">New</button>
            <button type="button" data-filter="maybe">Maybe</button>
            <button type="button" data-filter="watching">Watching</button>
          </div>
          <div class="result-options">
            <label>
              <span>Quality</span>
              <select id="qualityFilter">
                <option value="clean">Clean gear</option>
                <option value="all">All matches</option>
              </select>
            </label>
            <label>
              <span>Sort</span>
              <select id="sortMode">
                <option value="newest">Newest</option>
                <option value="price-asc">Price low</option>
                <option value="price-desc">Price high</option>
                <option value="source">Source</option>
              </select>
            </label>
          </div>
          <div class="toolbar-actions">
            <span class="live-status" id="liveStatus">Mock data</span>
            <button id="markAllSeen" type="button" title="Mark all listings as seen" aria-label="Mark all listings as seen">✓</button>
            <button id="copyDigest" type="button" title="Copy email digest" aria-label="Copy email digest">✉</button>
          </div>
        </section>

        <section class="source-filter-panel" aria-label="Source filter">
          <span>Sources</span>
          <div class="source-filter-list" id="sourceFilterList"></div>
        </section>

        <section class="alert-panel" aria-labelledby="alertTitle">
          <div class="alert-panel-header">
            <div>
              <p class="eyebrow">Daily Radar</p>
              <h3 id="alertTitle">New Finds</h3>
            </div>
            <div class="alert-summary">
              <strong id="alertCount">0</strong>
              <span id="alertDetail">No scan yet</span>
            </div>
          </div>
          <div class="alert-list" id="alertList" aria-live="polite"></div>
        </section>

        <section class="result-grid" id="resultGrid" aria-live="polite"></section>
      </main>
    </div>

    <template id="listingTemplate">
      <article class="listing-card">
        <a class="image-link" target="_blank" rel="noreferrer">
          <img alt="" loading="lazy" />
          <span class="new-pill">New</span>
          <span class="source-avatar"></span>
        </a>
        <div class="listing-body">
          <div class="listing-meta">
            <span class="source-chip"></span>
            <span class="condition"></span>
          </div>
          <h3></h3>
          <p class="shop-name"></p>
          <div class="price-row">
            <strong></strong>
            <span></span>
          </div>
          <div class="card-actions">
            <button class="watch-button" type="button" title="Watch listing" aria-label="Watch listing">☆</button>
            <button class="feedback-button hide-similar-button" type="button" title="Hide listings with similar noise signals">Hide similar</button>
            <button class="feedback-button gear-button" type="button" title="Train Bumpers that this is gear">This is gear</button>
            <button class="feedback-button noise-button" type="button" title="Train Bumpers that this is noise">This is noise</button>
            <a class="open-link" target="_blank" rel="noreferrer">Open</a>
          </div>
        </div>
      </article>
    </template>

    <template id="alertTemplate">
      <article class="alert-item">
        <a class="alert-thumb" target="_blank" rel="noreferrer">
          <img alt="" loading="lazy" />
          <span class="source-avatar"></span>
        </a>
        <div class="alert-copy">
          <div class="listing-meta">
            <span class="source-chip"></span>
            <span class="alert-price"></span>
          </div>
          <h4></h4>
          <p></p>
        </div>
        <a class="alert-open" target="_blank" rel="noreferrer">Open</a>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
